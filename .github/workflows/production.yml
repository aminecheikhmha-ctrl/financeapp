name: Production Crons

on:
  schedule:
    # Signaux toutes les heures en semaine (9h-22h UTC)
    - cron: "0 9-22 * * 1-5"
    # Rapport hebdo — Lundi 7h UTC
    - cron: "0 7 * * 1"
    # Blog — Lundi 6h UTC
    - cron: "0 6 * * 1"
    # Emails séquence — Tous les jours 8h UTC
    - cron: "0 8 * * *"
    # Ordres pending — Toutes les 5 min en session
    - cron: "*/5 14-21 * * 1-5"
  workflow_dispatch:
    inputs:
      job:
        description: "Job à lancer manuellement"
        required: true
        default: "health"
        type: choice
        options: [signals, weekly-report, blog, emails, pending-orders, health]

jobs:
  signals:
    if: github.event.schedule == '0 9-22 * * 1-5' || github.event.inputs.job == 'signals'
    runs-on: ubuntu-latest
    steps:
      - name: Refresh signals
        run: |
          curl -sf -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/signals"

  weekly-report:
    if: github.event.schedule == '0 7 * * 1' || github.event.inputs.job == 'weekly-report'
    runs-on: ubuntu-latest
    steps:
      - name: Send weekly reports
        run: |
          curl -sf -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/reports/weekly-email"

  blog:
    if: github.event.schedule == '0 6 * * 1' || github.event.inputs.job == 'blog'
    runs-on: ubuntu-latest
    steps:
      - name: Generate blog posts
        run: |
          curl -sf -X POST -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/blog/generate"

  emails:
    if: github.event.schedule == '0 8 * * *' || github.event.inputs.job == 'emails'
    runs-on: ubuntu-latest
    steps:
      - name: Send sequence emails
        run: |
          curl -sf -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/emails"

  pending-orders:
    if: github.event.schedule == '*/5 14-21 * * 1-5' || github.event.inputs.job == 'pending-orders'
    runs-on: ubuntu-latest
    steps:
      - name: Execute pending orders
        run: |
          curl -sf -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/execute-pending-orders"

  health:
    if: github.event.inputs.job == 'health'
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          STATUS=$(curl -sf "${{ secrets.APP_URL }}/api/health" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))")
          echo "Health status: $STATUS"
          if [ "$STATUS" != "healthy" ]; then exit 1; fi
