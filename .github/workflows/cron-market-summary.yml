name: Cron — Market Summary

on:
  schedule:
    # Every weekday at 08:00 UTC
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/cron/market-summary
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/market-summary"
