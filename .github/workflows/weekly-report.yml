name: Weekly Report

on:
  schedule:
    - cron: "0 7 * * 1"  # Lundi 7h UTC
  workflow_dispatch:

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    steps:
      - name: Send weekly reports
        run: |
          curl -f -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            ${{ secrets.APP_URL }}/api/reports/weekly-email
